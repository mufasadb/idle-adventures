<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Idle Adventure</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: ui-monospace, "SF Mono", monospace; background: #16161c; color: #dcdce2; padding: 1.25rem; margin: 0; }
      h1 { font-size: 1.3rem; margin: 0; }
      h2 { font-size: 0.95rem; margin: 1rem 0 0.4rem; color: #ffd75e; text-transform: uppercase; letter-spacing: 0.05em; }
      header { display: flex; align-items: baseline; gap: 0.75rem; border-bottom: 1px solid #333; padding-bottom: 0.5rem; }
      .muted { color: #8a8a95; }
      .small { font-size: 0.8rem; }
      .cols { display: flex; gap: 1.5rem; align-items: flex-start; flex-wrap: wrap; margin-top: 0.75rem; }
      section { min-width: 220px; }
      .mapwrap { min-width: unset; }

      button { font-family: inherit; font-size: 0.85rem; background: #2a2a34; color: #e8e8ee; border: 1px solid #444; border-radius: 4px; padding: 0.25rem 0.6rem; cursor: pointer; }
      button:hover { background: #3a3a48; border-color: #6a6a80; }
      button.link { background: none; border: none; color: #8ab4ff; padding: 0 0.2rem; }

      /* grid */
      .grid { display: grid; gap: 1px; background: #0e0e12; padding: 2px; width: max-content; border-radius: 4px; }
      .gridscroll { max-height: 72vh; overflow-y: auto; width: max-content; max-width: 100%; overflow-x: auto; border-radius: 4px; }
      .tile { width: 1.4rem; height: 1.4rem; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; user-select: none; position: relative; }
      .terrain-plains { background: #3f5c33; }
      .terrain-mud { background: #52422e; }
      .terrain-river { background: #295080; }
      .terrain-ice { background: #8fb8cc; color: #223; }
      .terrain-mountain { background: #5c5c63; }
      .poi { font-weight: bold; color: #ffd75e; }
      .poi.locked { color: #8a7a3a; } /* visible but tier-locked */
      /* cww: a resolved forage node tinted by its material — flint/deadwood pop against the herb yellow so the bootstrap tool-materials are legible at a glance. `.grid` prefix outranks the asset-trial .poi gold in both render modes. */
      .grid .tile.poi.mat-flint { color: #cfe0ea; }    /* pale stone */
      .grid .tile.poi.mat-deadwood { color: #d9a662; } /* dry wood */
      .grid .tile.poi.mat-berries { color: #e07a97; }  /* berry red */
      .player { color: #fff; background: #c03838 !important; border-radius: 3px; }
      .tile { cursor: pointer; }
      .tile:hover { outline: 2px solid #8ab4ff; outline-offset: -2px; }
      .tile.path { box-shadow: inset 0 0 0 2px #8ab4ff88; background-image: radial-gradient(#8ab4ff55 40%, transparent 42%); }
      .tile.path-transport { box-shadow: inset 0 0 0 2px #4a90d9; }  /* transport-cheapened */
      .tile.path-tool { box-shadow: inset 0 0 0 2px #48c774; }        /* gear-discounted */
      .tile.path-enabled { box-shadow: inset 0 0 0 2px #f0a020; }     /* climbing-pick unlocked */
      .tile.path-goal { outline: 2px solid #ffd75e; outline-offset: -2px; }
      /* eot: a leg crossing impassable terrain — the red "this won't work" marker */
      .tile.path-blocked { box-shadow: inset 0 0 0 2px #ff3b3b; background-image: radial-gradient(#ff3b3b88 45%, transparent 47%); }
      .tile.path-blocked::after { content: "✗"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #ff5b5b; font-weight: bold; pointer-events: none; }
      /* eot: a player-placed waypoint (a leg endpoint) */
      .tile.path-waypoint { outline: 2px dashed #8ab4ff; outline-offset: -2px; }
      .pathbanner.blocked { color: #ff9b9b; }
      .pathbanner { font-size: 0.82rem; margin: 0.4rem 0; min-height: 1.2rem; }
      /* 48l.6 asset trial: pixel-art tiles + ¾ billboard sprites */
      .grid.asset-trial .tile { width: 32px; height: 32px; font-size: 0; background-size: 32px 32px; image-rendering: pixelated; position: relative; }
      .grid.asset-trial .tile .sprite { position: absolute; left: 50%; bottom: 1px; transform: translateX(-50%); width: 48px; height: 48px; image-rendering: pixelated; pointer-events: none; z-index: 2; }
      .grid.asset-trial .tile .nodeicon { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; image-rendering: pixelated; pointer-events: none; z-index: 2; filter: drop-shadow(0 1px 1px #000a); }
      .grid.asset-trial .tile.player { font-size: 20px; color: #ffd75e; text-shadow: 0 0 3px #000, 0 0 3px #000; z-index: 3; }
      .grid.asset-trial .tile.poi { color: #ffd75e; text-shadow: 0 0 3px #000; }
      /* cww: in sprite mode a resolved forage material shows its LETTER (no material icon exists yet) — the generic herb icon is suppressed, so make the f/d/b visible + material-coloured (beats the .poi gold above by source order at equal specificity). */
      .grid.asset-trial .tile.poi.mat-flint,
      .grid.asset-trial .tile.poi.mat-deadwood,
      .grid.asset-trial .tile.poi.mat-berries { font-size: 18px; font-weight: bold; }
      .grid.asset-trial .tile.poi.mat-flint { color: #cfe0ea; }
      .grid.asset-trial .tile.poi.mat-deadwood { color: #d9a662; }
      .grid.asset-trial .tile.poi.mat-berries { color: #e07a97; }
      .pathbanner .over { color: #ff6b6b; } /* route costs more energy than you have */
      .pathbanner.engaged { color: #ffb454; font-weight: 600; } /* a fight is live — point at the panel */

      /* current-tile "Here" panel */
      .here { background: #20202a; border: 1px solid #383842; border-left: 3px solid #ffd75e; border-radius: 5px; padding: 0.5rem 0.7rem; margin-bottom: 0.6rem; font-size: 0.85rem; line-height: 1.5; }
      .here.monster { border-left-color: #c03838; }
      .here.locked { border-left-color: #8a7a3a; }
      .here button { margin-left: 0.4rem; }
      .here .tier { background: #4a3a1a; color: #ffd75e; border-radius: 3px; padding: 0 0.3rem; font-size: 0.75rem; }
      .here .forecast { font-size: 0.8rem; color: #b8b8c8; margin-top: 0.3rem; }
      .forecast .good { color: #6bbf59; }
      .forecast .over { color: #ff6b6b; }
      .forecast .was { color: #d9a441; font-size: 0.72rem; } /* 67e: damage-change delta ("was N") after a coat/swap/potion */
      .engagement .forecast { margin: 0.4rem 0; }

      /* slot strip — supplies vs loot vs empty */
      .slots { display: flex; flex-wrap: wrap; gap: 3px; margin: 0.3rem 0; }
      .slot { min-width: 3.2rem; height: 2rem; border: 1px solid #383842; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.62rem; line-height: 1.1; text-align: center; padding: 0 0.2rem; }
      .slot .q { color: #b8b8c0; font-size: 0.6rem; }
      .slot.empty { color: #45454f; border-style: dashed; }
      .slot.food { background: #2c3320; border-color: #4a5a2e; color: #b9d08a; }
      .slot[data-eatfood] { cursor: context-menu; } /* mco: right-click to designate auto-eat food */
      .slot.food.designated { border: 2px solid #cfe08a; box-shadow: 0 0 0 1px #cfe08a55; position: relative; } /* designated auto-eat food */
      .slot .autoeat { position: absolute; top: -0.5rem; right: -0.4rem; font-size: 0.72rem; } /* 🍴 badge */
      .slot.potion { background: #2a2233; border-color: #5a3e6a; color: #d0a8e0; }
      .slot.battle { background: #331e1e; border-color: #6a2e2e; color: #e69a9a; }
      .slot.ammo { background: #2e281c; border-color: #6a582e; color: #e0c488; } /* arrows (D45): amber quiver */
      .slot.tool { background: #24242c; border-color: #4a4a56; color: #b0b0bc; }
      .slot.loot { background: #33301e; border-color: #6a5e2e; color: #ffd75e; }
      .slot.ghost { border-style: dashed; border-color: #3a3a46; color: #6a6a78; opacity: 0.6; font-style: italic; }
      .slots.ghosts { margin-top: 2px; padding-top: 3px; border-top: 1px dotted #2c2c34; }
      .pathbanner button[data-walk] { font-weight: bold; }

      /* panels */
      .row { display: flex; justify-content: space-between; gap: 1rem; padding: 0.1rem 0; border-bottom: 1px dotted #2c2c34; }
      .k { color: #8a8a95; } .v { text-align: right; }
      .chip { background: #24242c; border: 1px solid #383842; border-radius: 3px; padding: 0.05rem 0.35rem; font-size: 0.8rem; white-space: nowrap; }
      .bank, .craftlist, .actions { display: flex; flex-direction: column; gap: 0.3rem; }
      .actions { flex-direction: row; flex-wrap: wrap; }
      .bankitem, .craftitem, .mapcard { display: flex; align-items: center; gap: 0.5rem; }
      .mapcard { background: #20202a; border: 1px solid #333; border-radius: 5px; padding: 0.5rem 0.7rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
      .mapcard b { text-transform: capitalize; min-width: 5rem; }
      .mapoffer { display: flex; flex-direction: column; gap: 0.2rem; }
      /* zpm.3: free local map (renewable, green) vs earned map (valued, tarnished gold) */
      .mapcard.local { border-left: 3px solid #4f9c78; }
      .mapcard.earned { border-left: 3px solid #b8933f; background: #262019; }
      .mapcard .muted.small { flex-basis: 100%; }
      .maptag { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.04em; padding: 0.05rem 0.4rem; border-radius: 999px; font-weight: 600; white-space: nowrap; }
      .maptag.free { background: #1a2c23; color: #7fd6a8; border: 1px solid #2f5a45; }
      .maptag.tier { background: #2e2612; color: #e0b45e; border: 1px solid #6b551f; }
      .mapgroup { font-size: 0.95rem; margin: 0.85rem 0 0.3rem; }
      /* zpm.3: two-step prep banner */
      .prepbar { display: flex; align-items: center; gap: 1rem; justify-content: space-between; flex-wrap: wrap; background: #20202a; border: 1px solid #3a3a46; border-radius: 6px; padding: 0.6rem 0.9rem; margin-top: 0.75rem; }
      .prephead { flex: 1; min-width: 12rem; text-transform: capitalize; }
      .prephead .maptag { margin-left: 0.35rem; }
      button.embark-final { background: #2f6b45; color: #eafff2; border: 1px solid #3f8a5a; font-weight: 600; padding: 0.45rem 1.1rem; border-radius: 5px; font-size: 0.95rem; }
      button.embark-final:hover { background: #3a8256; }
      .craftitem.locked { opacity: 0.5; }
      .craftitem .craftname { font-weight: 600; }
      .craftgroup { display: flex; flex-direction: column; gap: 0.15rem; }
      .craftgroup .craftname { font-weight: 600; }
      .craftpath { margin-left: 0.9rem; font-size: 0.78rem; color: #b8b8c8; display: flex; align-items: center; gap: 0.4rem; }
      .craftpath.locked { opacity: 0.55; }
      .craftgroup.locked > .craftname { opacity: 0.6; }
      .warn { color: #ff9a5e; font-size: 0.75rem; }

      /* bars */
      .bar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.35rem; font-size: 0.85rem; }
      .bar span { width: 3.5rem; color: #8a8a95; }
      .track { width: 220px; height: 0.7rem; background: #24242c; border-radius: 4px; overflow: hidden; display: flex; }
      .fill { height: 100%; }
      .fill.energy { background: #6bbf59; }
      .fill.spend { background: #d98a2b; }        /* a pending walk will spend this much */
      .fill.spend.over { background: #c03838; }    /* the walk would strand you (cost > energy) */
      .overfull { color: #6bbf59; font-weight: 600; } /* over-full stamina surplus after a manual over-eat (m0a) — distinct class so it can't tint any .over danger text */
      .fill.hp { background: #c03838; }
      .fill.monster { background: #c0504d; }

      /* log */
      .logbox { width: 100%; margin-top: 1rem; border-top: 1px solid #333; }
      .logline { font-size: 0.82rem; padding: 0.1rem 0; border-bottom: 1px dotted #24242c; }
      .legalkey { outline: 2px solid #8ab4ff; padding: 0 0.2rem; }
      .lockedkey { color: #8a7a3a; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
